<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Разбор кейса учеников</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #161616;
      --accent: #b8873f;
      --accent-light: #d4a855;
      --border: #222222;
      --text: #f0f0f0;
      --muted: #888888;
      --radius: 16px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── VIDEO BACKGROUND ── */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      opacity: 0.55;
      pointer-events: none;
    }
    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: linear-gradient(
        to bottom,
        rgba(10,10,10,.85) 0%,
        rgba(10,10,10,.65) 50%,
        rgba(10,10,10,.85) 100%
      );
      pointer-events: none;
    }

    .content-layer {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* ── CONTAINER ── */
    .container {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── HEADER ── */
    .site-header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      background: rgba(10,10,10,.6);
      backdrop-filter: blur(10px);
    }
    .site-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color .2s;
    }
    .back-link:hover { color: var(--text); }
    .back-link svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── MAIN ── */
    .page-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      text-align: center;
    }

    .page-main .label {
      display: inline-block;
      background: rgba(184,135,63,.12);
      border: 1px solid rgba(184,135,63,.3);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 100px;
      padding: 6px 16px;
      margin-bottom: 28px;
    }

    .page-main h1 {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 900;
      color: #ffffff;
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 24px;
    }

    .page-main h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-main .subtext {
      font-size: clamp(16px, 3.5vw, 19px);
      color: #aaaaaa;
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto 48px;
    }

    /* ── PLACEHOLDER VIDEO CARD ── */
    .video-card {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 48px;
      color: var(--muted);
      font-size: 15px;
    }
    .video-card__icon {
      width: 64px;
      height: 64px;
      background: rgba(184,135,63,.12);
      border: 1px solid rgba(184,135,63,.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-card__icon svg {
      width: 28px;
      height: 28px;
      fill: var(--accent);
    }

    /* ── BACK BUTTON ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform .2s, opacity .2s;
    }
    .btn:hover { transform: translateY(-2px); opacity: .92; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: rgba(184,135,63,.4); }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4" />
  </video>
  <div id="bg-overlay"></div>

  <div class="content-layer">

    <header class="site-header">
      <div class="container">
        <a href="index.html" class="logo">OF Agency</a>
        <a href="index.html" class="back-link">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Назад
        </a>
      </div>
    </header>

    <main class="page-main">
      <div class="container">
        <div class="label">Кейс учеников</div>
        <h1>Разбор кейса <span>учеников</span></h1>
        <p class="subtext">Видео и подробности скоро появятся здесь. Мы покажем реальный путь от нуля до первых результатов.</p>

        <div class="video-card">
          <div class="video-card__icon">
            <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          <span>Видео скоро</span>
        </div>

        <a href="index.html" class="btn btn-outline">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Вернуться на главную
        </a>
      </div>
    </main>

  </div>

</body>
</html>
